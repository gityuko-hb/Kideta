name: '🐛 Bug Report'
description: 'Report a bug in Kideta'
labels: ['bug', 'unconfirmed']
type: Bug
body:
  - type: dropdown
    attributes:
      label: '📦 Affected Crate'
      description: 'Which crate(s) does this bug affect?'
      multiple: true
      options:
        - 'kideta-core'
        - 'kideta-index'
        - 'kideta-storage'
        - 'kideta-query'
        - 'kideta-server'
        - 'kideta-api'
        - 'kideta-distributed'
        - 'kideta-c'
        - 'kideta-python'
        - 'kideta-benchmarking'
        - 'Unknown / Multiple'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: '💻 Operating System'
      multiple: true
      options:
        - 'Linux (x86_64)'
        - 'Linux (aarch64)'
        - 'macOS (Apple Silicon)'
        - 'macOS (Intel)'
        - 'Windows'
        - 'Other'
    validations:
      required: true

  - type: input
    attributes:
      label: '🦀 Rust Version'
      description: 'Output of `rustc --version`'
      placeholder: 'e.g. rustc 1.78.0 (9b00956e5 2024-04-29)'
    validations:
      required: true

  - type: input
    attributes:
      label: '📌 Kideta Version'
      description: 'Git commit hash or crate version'
      placeholder: 'e.g. v0.1.0 or ee14d93'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: '⚡ SIMD Feature Flags'
      description: 'Which SIMD path is active on the machine where the bug occurs?'
      multiple: false
      options:
        - 'AVX-512'
        - 'AVX2+FMA'
        - 'SSE4.1'
        - 'NEON (aarch64)'
        - 'Scalar (no SIMD)'
        - 'Unknown'
    validations:
      required: false

  - type: textarea
    attributes:
      label: '🐛 What happened?'
      description: 'A clear and concise description of the bug.'
    validations:
      required: true

  - type: textarea
    attributes:
      label: '📷 How to reproduce it?'
      description: 'Minimal reproducible example — prefer a Rust snippet or CLI command.'
      render: rust

  - type: textarea
    attributes:
      label: '🚦 What did you expect?'
      description: 'What should have happened instead?'

  - type: textarea
    attributes:
      label: '📋 Backtrace / Logs'
      description: 'Paste any panic backtrace or log output here (`RUST_BACKTRACE=1` or `RUST_LOG=debug`).'
      render: text

  - type: textarea
    attributes:
      label: '📝 Additional Information'
      description: 'Anything else that might help — vector dimensions, dataset size, index type, etc.'

  - type: dropdown
    attributes:
      label: '🛠️ Willing to Submit a PR?'
      options:
        - 'Yes, I am willing to submit a PR'
        - 'No, but I am happy to help test the fix'
        - 'No'
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: '✅ Checklist'
      description: 'Please confirm before submitting.'
      options:
        - label: 'I have searched existing issues and this bug has not been reported yet.'
          required: true
        - label: 'I have included the Rust version and OS.'
          required: true
        - label: 'I have provided a minimal reproducible example or clear steps to reproduce.'
          required: false
